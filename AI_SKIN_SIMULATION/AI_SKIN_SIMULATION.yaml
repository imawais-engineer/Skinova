  version: ''
  termsOfService: https://www.makeupar.com/perfectbeauty/youcam/terms-of-service-api
  contact:
    email: YouCamOnlineEditor_API@perfectcorp.com
  license:
    name: Privacy policy
    url: https://www.makeupar.com/youcamapps/youcam/privacy-policy.html
servers:
  - url: https://yce-api-01.makeupar.com
tags:
  - name: V1.0
    description: >-
      Simulate skin texture changes (wrinkles, radiance, oiliness, etc.) on
      uploaded images using AI processing.
paths:
  /s2s/v2.0/file/skin-simulation:
    post:
      summary: Create a new file.
      description: >
        To upload a new file, you'll first need to use the File API. It will
        give you a URL – use that URL to upload your file. Once the upload is
        finished, you can use the file_id from the same response to start using
        our AI features.
      tags:
        - V1.0
      security:
        - BearerAuthenticationV2: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileV1.1'
      responses:
        '200':
          description: Successful retrieval of file upload information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicFileResponse'
        '400':
          $ref: '#/components/responses/InvalidParameters'
        '401':
          $ref: '#/components/responses/InvalidApiKey'
  /s2s/v2.0/task/skin-simulation:
    post:
      summary: Run an AI Skin Simulation task.
      description: >
        This endpoint initiates the skin simulation process. You must provide a
        source file (via URL or File ID) and specify the simulation parameters
        (wrinkle, radiance, etc.). At least one parameter cannot be zero. The
        task will be processed asynchronously, and you can check its status
        using the task_id returned in this response.
      tags:
        - V1.0
      security:
        - BearerAuthenticationV2: []
      requestBody:
        required: true
        description: |
          Simulation intensity cannot be all zero.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunSkinSimulationTaskV2'
      responses:
        '200':
          description: Successful execution of the task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicRunTaskResponseV2'
        '400':
          description: Failed execution of task
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/RunError'
        '401':
          $ref: '#/components/responses/InvalidApiKey'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /s2s/v2.0/task/skin-simulation/{task_id}:
    get:
      summary: Check the status of a AI Skin Simulation task.
      tags:
        - V1.0
      security:
        - BearerAuthenticationV2: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            example: grH0CvsgXuAIHLUzD0V1Ol34hoet3R1tvdbtiVHrDb6_UqCLKIejAIajwxrhOAfe
          description: ID of task to check
      responses:
        '200':
          description: Successful check of the task status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStatusResponseBodySingleUrlResultsV2'
        '400':
          $ref: '#/components/responses/InvalidTaskId'
        '401':
          $ref: '#/components/responses/InvalidApiKey'
        '500':
          $ref: '#/components/responses/TaskTimeout'
components:
  securitySchemes:
    BearerAuthenticationV2:
      type: http
      scheme: bearer
      description: >-
        Use the standard 'Bearer authentication'. Put your 'API Key' in header:
        `Authorization:Bearer YOUR_API_KEY`. Notice that there is ' ' a space
        between 'Bearer' and the 'YOUR_API_KEY'.
  schemas:
    RunSkinSimulationTaskV2:
      title: Run Skin Simulation Task V2
      allOf:
        - $ref: '#/components/schemas/BasicRunTaskV2'
        - type: object
          properties:
            wrinkle:
              type: number
              description: >-
                Reduce the appearance of wrinkles and fine lines while restoring
                smoother, firmer, visibly rejuvenated and youthful-looking skin.
                <br> 0.0 for original skin, 1.0 for most wrinkle removed skin.
              example: 1
              minimum: 0
              maximum: 1
            radiance:
              type: number
              description: >-
                Enhance skin radiance and luminosity, unveiling a refreshed,
                revitalized glow with a brighter, more radiant complexion. <br>
                0.0 for original skin luminosity, 1.0 for maximum
                radiant/glowing skin.
              example: 1
              minimum: 0
              maximum: 1
            oiliness:
              type: number
              description: >-
                Control excess shine for a fresh, clean, shine-free complexion
                that feels balanced and comfortably matte. <br> 0.0 for original
                skin, 1.0 for maximum oil/shine added to skin.
              example: 1
              minimum: 0
              maximum: 1
            acne:
              type: number
              description: >-
                Purify and clear blemish-prone skin by reducing breakouts and
                blackheads, revealing a smoother, refined, and visibly flawless
                radiant complexion. <br> 0.0 for original skin, 1.0 for most
                acne/pimples removed.
              example: 1
              minimum: 0
              maximum: 1
            eye_bags:
              type: number
              description: >-
                Visibly reduce under-eye puffiness, restoring a smoother,
                firmer, and more refreshed, well-rested appearance. <br> 0.0 for
                original under-eye appearance, 1.0 for most eye bags removed.
              example: 1
              minimum: 0
              maximum: 1
            dark_circle:
              type: number
              description: >-
                Visibly diminish dark circles, revealing a brighter, well-rested
                eye area with a refreshed and radiant appearance. <br> 0.0 for
                original under-eye color, 1.0 for most dark circles removed.
              example: 1
              minimum: 0
              maximum: 1
            spots:
              type: number
              description: >-
                Target and visibly fade age spots while refining skin clarity,
                revealing a smoother, and more even-toned, youthful glow. <br>
                0.0 for original skin, 1.0 for most age spots/blemishes removed.
              example: 1
              minimum: 0
              maximum: 1
            pores:
              type: number
              description: >-
                Refine and visibly minimize enlarged pores, revealing smoother,
                more polished, and flawlessly refined skin. <br> 0.0 for
                original pore visibility, 1.0 for most refined/invisible pores.
              example: 1
              minimum: 0
              maximum: 1
            texture:
              type: number
              description: >-
                Refine skin texture to couture-level smoothness, visibly
                perfecting irregularities and unveiling a silky, impeccably
                polished, and luminous complexion. <br> 0.0 for original skin
                texture, 1.0 for smoothest skin texture.
              example: 1
              minimum: 0
              maximum: 1
            redness:
              type: number
              description: >-
                Calm and rebalance sensitive skin by visibly reducing redness,
                soothing rosacea-prone areas, and restoring a clearer, more
                even-toned and comfortingly refined complexion. <br> 0.0 for
                original skin tone, 1.0 for most redness/irritation removed.
              example: 1
              minimum: 0
              maximum: 1
          not:
            properties:
              wrinkle:
                type: number
                enum:
                  - 0
              radiance:
                type: number
                enum:
                  - 0
              oiliness:
                type: number
                enum:
                  - 0
              acne:
                type: number
                enum:
                  - 0
              eye_bags:
                type: number
                enum:
                  - 0
              dark_circle:
                type: number
                enum:
                  - 0
              spots:
                type: number
                enum:
                  - 0
              pores:
                type: number
                enum:
                  - 0
              texture:
                type: number
                enum:
                  - 0
              redness:
                type: number
                enum:
                  - 0
    FileV1.1:
      title: File V1.1
      description: This object represents a file.
      type: object
      required:
        - files
      properties:
        files:
          type: array
          items:
            type: object
            required:
              - content_type
              - file_name
              - file_size
            properties:
              content_type:
                type: string
                example: image/jpg
                description: >-
                  Content MIME type for this file. Currently available values
                  are listed in the enum.
              file_name:
                type: string
                example: my-selfie.jpg
                description: Name of this file
              file_size:
                type: integer
                example: 50000
                description: >-
                  Content length for this file in bytes. Should not be larger
                  than 10MB.
    BasicFileResponse:
      type: object
      properties:
        files:
          type: array
          items:
            type: object
            properties:
              content_type:
                type: string
                example: image/jpg
                description: Content MIME type for this file.
              file_name:
                type: string
                example: my-selfie.jpg
                description: Name of this file
              file_id:
                type: string
                example: >-
                  U8aqJbsXGT537jtGnEDFHqxdDXqh8+oTF/cSkLimzuvVwMP+Jb1XbjPsf7ZgUgLY
                description: >-
                  ID of this file. Other run task API will need this
                  \`file_id\`.
              requests:
                type: array
                description: >-
                  Using upload \`url\`, \`headers\`, \`method\` below to upload
                  file. After completion, the \`file_id\` is used to proceed
                  with calling run task API.
                items:
                  type: object
                  properties:
                    headers:
                      type: object
                      example:
                        Content-Type: image/jpg
                        Content-Length: 50000
                      description: Headers to include when uploading the file
                    url:
                      type: string
                      example: https://example.com/presigned-upload-url
                      description: URL to upload this file
                    method:
                      type: string
                      example: PUT
                      description: HTTP method to upload this file
    BasicRunTaskV2SrcFileUrl:
      type: object
      required:
        - src_file_url
      properties:
        src_file_url:
          type: string
          description: Url of the file to run task. The url should be publicly accessible.
          example: https://example.com/selfie.jpg
    BasicRunTaskV2SrcFileId:
      type: object
      required:
        - src_file_id
      properties:
        src_file_id:
          type: string
          description: ID of file to run task. File ID from upload file API.
          example: pfNK5PuRe0MrwLHcGA3DOmB1ahwfXTbYHjv+KoBIxbE=
    BasicRunTaskV2:
      title: BasicRunTaskV2
      anyOf:
        - title: Run task with src file url
          allOf:
            - $ref: '#/components/schemas/BasicRunTaskV2SrcFileUrl'
        - title: Run task with src file ID
          allOf:
            - $ref: '#/components/schemas/BasicRunTaskV2SrcFileId'
    BasicRunTaskResponseV2:
      type: object
      properties:
        status:
          type: integer
          description: Response status
          example: 200
        data:
          type: object
          properties:
            task_id:
              type: string
              description: >-
                ID of this task. Task result is valid to query by this ID for 24
                hours.
              example: grH0CvsgXuAIHLUzD0V1Ol34hoet3R1tvdbtiVHrDb6_UqCLKIejAIajwxrhOAfe
    RunError:
      type: object
      properties:
        status:
          type: integer
          description: Response status
          example: 400
        error:
          type: string
          description: Error message
          example: The operation could not be completed
        error_code:
          type: string
          enum:
            - InvalidParameters
            - CreditInsufficiency
            - InvalidStyleGroup
            - InvalidStyle
            - BadRequest
          description: |
            Error code:
              * InvalidParameters - Invalid request parameters
              * CreditInsufficiency - Insufficient unit to run
              * BadRequest - Unexpected request parameter
              * InvalidStyleGroup - Invalid style group id
              * InvalidStyle - Invalid style id
    TaskStatusResponseBodySingleUrlResultsV2:
      type: object
      properties:
        url:
          type: string
          description: URL to download this result. Valid for 2 hours
          example: https://example.com/sample-result-url
  responses:
    InvalidParameters:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 400
                description: Response status
              error:
                type: string
                example: Invalid parameter value
              error_code:
                type: string
                example: InvalidParameters
    InvalidApiKey:
      description: Invalid or missing API key
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 401
                description: Response status
              error:
                type: string
                example: Invalid API key
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 429
                description: Response status
              error:
                type: string
                example: Too many requests
    InvalidTaskId:
      description: Invalid task ID
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 400
                description: Response status
              error:
                type: string
                example: Invalid task ID
    TaskTimeout:
      description: Task execution timeout
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 500
                description: Response status
              error:
                type: string
                example: Task execution timed out
