    ## JS Camera Kit

    {% partial file="/_partials/js-camera-kit.md" /%}
  version: ''
  termsOfService: https://www.makeupar.com/perfectbeauty/youcam/terms-of-service-api
  contact:
    email: YouCamOnlineEditor_API@perfectcorp.com
  license:
    name: Privacy policy
    url: https://www.makeupar.com/youcamapps/youcam/privacy-policy.html
servers:
  - url: https://yce-api-01.makeupar.com
paths:
  /s2s/v2.0/file/face-attr-analysis:
    post:
      summary: Create a new file.
      description: >
        To upload a new file, you'll first need to use the File API. It will
        give you a URL – use that URL to upload your file. Once the upload is
        finished, you can use the file_id from the same response to start using
        our AI features.
      tags:
        - V1.0
      security:
        - BearerAuthenticationV2: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileV1.1'
      responses:
        '200':
          description: Successful retrieval of file upload information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicFileResponse'
        '400':
          $ref: '#/components/responses/InvalidParameters'
        '401':
          $ref: '#/components/responses/InvalidApiKey'
  /s2s/v2.0/task/face-attr-analysis:
    post:
      summary: Run an Face Attribute Analysis task.
      description: >
        This endpoint initiates the face attribute analysis process. You must
        provide a source file (via URL or File ID) and specify which features to
        analyze. The task will be processed asynchronously, and you can check
        its status using the task_id returned in this response.
      tags:
        - V1.0
      security:
        - BearerAuthenticationV2: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasicRunFaceAttrTask'
      responses:
        '200':
          description: Successful execution of the task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicRunTaskResponseV2'
        '400':
          description: Failed execution of task
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/RunError'
        '401':
          $ref: '#/components/responses/InvalidApiKey'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /s2s/v2.0/task/face-attr-analysis/{task_id}:
    get:
      summary: Check an Face Attribute Analysis task status.
      tags:
        - V1.0
      security:
        - BearerAuthenticationV2: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            example: grH0CvsgXuAIHLUzD0V1Ol34hoet3R1tvdbtiVHrDb6_UqCLKIejAIajwxrhOAfe
          description: ID of task to check
      responses:
        '200':
          description: Successful check of the task status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaceAttrTaskStatusResponseV2'
        '400':
          $ref: '#/components/responses/InvalidTaskId'
        '401':
          $ref: '#/components/responses/InvalidApiKey'
        '500':
          $ref: '#/components/responses/TaskTimeout'
components:
  securitySchemes:
    BearerAuthenticationV2:
      type: http
      scheme: bearer
      description: >-
        Use the standard 'Bearer authentication'. Put your 'API Key' in header:
        `Authorization:Bearer YOUR_API_KEY`. Notice that there is ' ' a space
        between 'Bearer' and the 'YOUR_API_KEY'.
  schemas:
    BasicFaceAttrReqFaceAngleStrictnessLevel:
      type: string
      description: |
        The strictness level of face angle detection (pitch, yaw, roll).
        A stricter level ensures more accurate face attribute results.
        Default is 'high'.
        optoins:
          - strict: pitch <= 4 degrees, yaw <= 6 degrees, roll <= 4 degrees
          - high: pitch, yaw, roll <= 10 degrees
          - medium: pitch, yaw, roll <= 15 degrees
          - low: pitch, yaw, roll <= 20 degrees
          - flexible: pitch, yaw, roll <= 30 degrees
      enum:
        - strict
        - high
        - medium
        - low
        - flexible
      example: high
    BasicFaceAttrReqFeatures:
      description: |
        AI Face Analysis categories

        * Face Analysis
          - FACE: faceShape
          - EYES: eyeShape eyeSize eyeAngle eyeDistance eyelid
          - BROWS: eyebrowShape eyebrowThickness eyebrowDistance eyebrowShortness
          - LIPS: lipShape
          - NOSE: noseWidth noseLength
          - CHEEKBONES: cheekbones
          - AGE & GENDER: age gender
          - COLORS: eyeColor hairColor eyebrowColor lipColor

        * Facial Ratios
          - horizontalThird
          - verticalFifth
          - faceAspectRatio
          - eyeAspectRatio
          - eyebrowPosition
          - eyebrowArch
          - eyeHeightToEyebrowDistance
          - noseAspectRatio
          - noseWidthToMouthWidth
          - noseToLipToChin
          - upperLipToLowerLip
      type: array
      items:
        type: string
        enum:
          - eyeShape
          - eyeSize
          - eyeAngle
          - eyeDistance
          - eyelid
          - eyebrowShape
          - eyebrowThickness
          - eyebrowDistance
          - eyebrowShortness
          - cheekbones
          - faceShape
          - lipShape
          - noseWidth
          - noseLength
          - age
          - gender
          - eyeColor
          - lipColor
          - eyebrowColor
          - hairColor
          - horizontalThird
          - verticalFifth
          - faceAspectRatio
          - eyeAspectRatio
          - eyebrowPosition
          - eyebrowArch
          - eyeHeightToEyebrowDistance
          - noseAspectRatio
          - noseWidthToMouthWidth
          - noseToLipToChin
          - upperLipToLowerLip
    BasicRunFaceAttrTask:
      title: BasicRunFaceAttrTask
      type: object
      properties:
        request_id:
          type: integer
          description: |
            Incremental request number starting from 0. Requests with the same
            `request_id` will be ignored by the server. `request_id` should
            remain the same if the API client needs to retry due to a connection
            issue. This is to prevent duplicate deduction of units caused by
            running the same task repeatedly. For instance, if the same
            `file_id` is sent with the same `request_id`, the engine won't
            re-run the task, nor will duplicate consume units. However, if a
            client wants to generate multiple different results using the same
            `file_id`, the client needs to increment the `request_id` then the
            engine will re-run the task and consume the unit accordingly.
          example: 0
        payload:
          type: object
          required:
            - file_sets
            - actions
          properties:
            file_sets:
              type: object
              required:
                - src_ids
              properties:
                src_ids:
                  type: array
                  description: ID of file to run enhancement. File ID from upload file API.
                  items:
                    type: string
                    example: pfNK5PuRe0MrwLHcGA3DOmB1ahwfXTbYHjv+KoBIxbE=
            actions:
              description: Only accept 1 action.
              type: array
              items:
                type: object
                required:
                  - id
                  - params
                  - dst_actions
                properties:
                  id:
                    type: integer
                    description: |
                      ID of this action, start with 0. The client needs to
                      generate an `id` for each action. This action `id` has to
                      be unique per task. In the response from the get status
                      API, these action `id` will be used to let the client know
                      which results correspond to each action.
                    example: 0
                  params:
                    type: object
                    properties:
                      face_angle_strictness_level:
                        $ref: >-
                          #/components/schemas/BasicFaceAttrReqFaceAngleStrictnessLevel
                  dst_actions:
                    $ref: '#/components/schemas/BasicFaceAttrReqFeatures'
      required:
        - request_id
        - payload
        - actions
    BasicFaceAttrRespFaceQuality:
      type: object
      properties:
        has_face:
          type: boolean
          example: true
        area:
          type: string
          example: good
        frontal:
          type: string
          example: good
        lighting:
          type: string
          example: good
        faceangle:
          type: string
          example: good
    BasicFaceAttrRespFacialRatio:
      type: object
      properties:
        horizontal_third:
          type: array
          items:
            type: number
          example:
            - 33
            - 33
            - 33
        vertical_fifth:
          type: array
          items:
            type: number
          example:
            - 20
            - 20
            - 20
            - 20
            - 20
        face_aspect_ratio:
          type: array
          items:
            type: number
          description: The ratio of the width of the face to its height
          example:
            - 1
            - 1.46
        left_eye_aspect_ratio:
          type: array
          items:
            type: number
          description: The ratio of the height of the eye to its width
          example:
            - 1
            - 3
        right_eye_aspect_ratio:
          type: array
          items:
            type: number
          description: The ratio of the height of the eye to its width
          example:
            - 1
            - 3
        left_eyebrow_arch_to_eyebrow_width:
          type: array
          items:
            type: number
          description: |
            The ratio of the width of the eyebrow forepart (from the start of
            the eyebrow to the arch) to the total width of the eyebrow (from the
            start to the end)
          example:
            - 1
            - 1.476
        right_eyebrow_arch_to_eyebrow_width:
          type: array
          items:
            type: number
          description: |
            The ratio of the width of the eyebrow forepart (from the start of
            the eyebrow to the arch) to the total width of the eyebrow (from the
            start to the end)
          example:
            - 1
            - 1.523
        left_eye_height_to_eyebrow_distance:
          type: array
          items:
            type: number
          description: |
            The ratio of eye height to the vertical distance between the top of
            the eyebrow and the bottom of the eye
          example:
            - 1
            - 2.69
        right_eye_height_to_eyebrow_distance:
          type: array
          items:
            type: number
          description: |
            The ratio of eye height to the vertical distance between the top of
            the eyebrow and the bottom of the eye
          example:
            - 1
            - 2.775
        overall_eye_height_to_eyebrow_distance:
          type: array
          items:
            type: number
          example:
            - 1
            - 2.733
        nose_aspect_ratio:
          type: array
          items:
            type: number
          description: The ratio of the width of the nose to its height
          example:
            - 1
            - 1.172
        nose_width_to_mouth_width:
          type: array
          items:
            type: number
          description: The ratio of the width of the nose to the width of the mouth
          example:
            - 1
            - 1.475
        nose_to_lip_to_chin:
          type: array
          items:
            type: number
          description: |
            The ratio of the vertical distance between nose tip and the middle
            of the lips to the vertical distance between the middle of the lips
            and the chin
          example:
            - 1
            - 2.098
        upper_lip_to_lower_lip:
          type: array
          items:
            type: number
          description: |
            The ratio of the height of the upper lip to the height of the lower
            lip
          example:
            - 1
            - 1.099
    FaceAttrTaskStatusResponseV2:
      type: object
      properties:
        status:
          type: integer
          description: Response status
          example: 200
        data:
          type: object
          properties:
            task_status:
              type: string
              enum:
                - running
                - success
                - error
              description: Status of this task
            error:
              $ref: '#/components/schemas/EngineErrorCode'
            error_message:
              type: string
              description: Detailed description of error
            results:
              allOf:
                - type: object
                  properties:
                    face_quality:
                      $ref: '#/components/schemas/BasicFaceAttrRespFaceQuality'
                    facialratio:
                      $ref: '#/components/schemas/BasicFaceAttrRespFacialRatio'
                    cheekbone:
                      type: object
                      properties:
                        left:
                          type: string
                          enum:
                            - Flat Cheekbone
                            - High Cheekbone
                            - Low Cheekbone
                            - Round Cheeks
                        right:
                          type: string
                          enum:
                            - Flat Cheekbone
                            - High Cheekbone
                            - Low Cheekbone
                            - Round Cheeks
                        overrall:
                          type: string
                          enum:
                            - Flat Cheekbone
                            - High Cheekbone
                            - Low Cheekbone
                            - Round Cheeks
                    eyelid:
                      type: object
